<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投資ナビ - 今日の判断</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">投資ナビ</h1>
      </div>
      <div class="header-right">
        <span class="update-time" id="updateTime">読み込み中...</span>
        <button class="btn-refresh" onclick="refreshData()">更新</button>
      </div>
    </header>

    <!-- ヘッドライン（最重要。1行で今やること） -->
    <section class="today-section">
      <div class="today-card" id="todayCard">
        <div class="today-action-label">今日の結論</div>
        <div class="today-headline" id="todayHeadline">読み込み中...</div>
        <div class="today-summary" id="todaySummary"></div>
        <div class="today-bottom-note" id="todayBottomNote" style="display:none;"></div>
      </div>
    </section>

    <!-- つみたて枠警告（マクロ5/5フル成立時のみ表示） -->
    <section class="tsumitate-section" id="tsumitateWarning" style="display:none;">
      <div class="tsumitate-card" id="tsumitateCard">
        <div class="tsumitate-headline" id="tsumitateHeadline"></div>
        <div class="tsumitate-detail" id="tsumitateDetail"></div>
        <div class="tsumitate-guide" id="tsumitateGuide"></div>
        <div class="tsumitate-list" id="tsumitateList"></div>
      </div>
    </section>

    <!-- 市場の温度 -->
    <section class="temp-section">
      <div class="temp-card">
        <div class="temp-label">市場の温度（Crash Score）</div>
        <div class="temp-row">
          <div id="gaugeChart" class="gauge-container-small"></div>
          <div class="temp-info">
            <div class="temp-number" id="scoreNumber">--</div>
            <div class="temp-status" id="scoreLabel">読み込み中</div>
            <div class="temp-explain" id="scoreAction"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- 今日のアクション（優先順リスト） -->
    <section class="action-section">
      <h2 class="section-title-simple">今日のアクション</h2>
      <div class="action-list" id="actionList"></div>
    </section>

    <!-- ポートフォリオ（口座枠別） -->
    <section class="portfolio-section">
      <h2 class="section-title-simple">ポートフォリオ</h2>
      <div class="portfolio-cards" id="portfolioCards"></div>
      <div class="portfolio-note">※「○○を買った / 売った」とClaude Codeに報告すると自動反映されます</div>
    </section>

    <!-- 買い戻しキュー（利確後の再投入予約） -->
    <section class="buyback-section" id="buybackSection" style="display:none;">
      <h2 class="section-title-simple">再投入予約（利確した資金）</h2>
      <div class="buyback-card" id="buybackCard"></div>
    </section>

    <!-- マクロ過熱シグナル（売り5条件） -->
    <section class="macro-section">
      <h2 class="section-title-simple">マクロ過熱シグナル（売り判定の5条件）</h2>
      <div class="macro-card" id="macroCard">
        <div class="macro-header">
          <span class="macro-label" id="macroLabel">--</span>
          <span class="macro-count" id="macroCount">0/5</span>
        </div>
        <div class="macro-conditions" id="macroConditions"></div>
      </div>
    </section>

    <!-- セクター参考情報 -->
    <section class="sector-section">
      <h2 class="section-title-simple">セクター状況（参考）</h2>
      <div class="sector-cards" id="sectorInfoCards"></div>
      <div class="forex-info" id="adviceForex" style="display:none;"></div>
    </section>

    <!-- 詳細データ（折りたたみ） -->
    <details class="detail-section">
      <summary class="detail-toggle">詳細データを見る</summary>
      <div class="detail-inner">
        <h3 class="detail-subtitle">主要指標</h3>
        <div class="indicator-grid" id="indicatorGrid"></div>

        <h3 class="detail-subtitle">底打ちシグナル</h3>
        <div class="signal-card" id="signalSection" style="display:none;">
          <div class="signal-header">
            <span class="signal-title" id="signalTitle">底打ちチェック</span>
            <span class="signal-count" id="signalCount">0/7</span>
          </div>
          <div class="signal-conditions" id="signalConditions"></div>
        </div>

        <h3 class="detail-subtitle">セクター騰落率</h3>
        <div class="sector-grid" id="sectorGrid"></div>

        <h3 class="detail-subtitle">原油・金・為替</h3>
        <div class="geo-grid" id="geoGrid"></div>

        <h3 class="detail-subtitle">注目銘柄の現在値</h3>
        <div class="watch-grid" id="watchlistGrid"></div>
      </div>
    </details>

    <!-- Footer -->
    <footer class="footer">
      <p>※ 投資助言ではありません。判断は自己責任で。</p>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
