<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投資ナビ - 今日の判断</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">投資ナビ</h1>
      </div>
      <div class="header-right">
        <span class="update-time" id="updateTime">読み込み中...</span>
        <button class="btn-refresh" onclick="refreshData()">更新</button>
      </div>
    </header>

    <!-- 今日の判断（最重要。これだけ見ればOK） -->
    <section class="today-section" id="todaySection">
      <div class="today-card" id="todayCard">
        <div class="today-action-label">今やること</div>
        <div class="today-headline" id="todayHeadline">読み込み中...</div>
        <div class="today-summary" id="todaySummary"></div>
        <div class="today-bottom-note" id="todayBottomNote" style="display:none;"></div>
      </div>
    </section>

    <!-- 市場の温度（ゲージ） -->
    <section class="temp-section">
      <div class="temp-card">
        <div class="temp-label">市場の温度</div>
        <div class="temp-row">
          <div id="gaugeChart" class="gauge-container-small"></div>
          <div class="temp-info">
            <div class="temp-number" id="scoreNumber">--</div>
            <div class="temp-status" id="scoreLabel">読み込み中</div>
            <div class="temp-explain" id="scoreAction"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- セクター別アドバイス -->
    <section class="sectors-section" id="adviceSection" style="display:none;">
      <h2 class="section-title-simple">セクター別の判断</h2>
      <div class="sector-cards" id="adviceSectors"></div>
      <div class="forex-info" id="adviceForex" style="display:none;"></div>
    </section>

    <!-- 資金状況 -->
    <section class="budget-section">
      <h2 class="section-title-simple">資金状況</h2>
      <div class="budget-card" id="budgetCard">
        <div class="budget-row">
          <span class="budget-label">NISA成長枠</span>
          <span class="budget-amount" id="nisaRemaining">--</span>
          <span class="budget-status" id="nisaStatus">--</span>
        </div>
        <div class="budget-row">
          <span class="budget-label">特定口座</span>
          <span class="budget-amount" id="tokuteiRemaining">--</span>
          <span class="budget-status" id="tokuteiStatus">--</span>
        </div>
        <div class="budget-total">
          <span>残り合計</span>
          <span id="totalRemaining">--</span>
        </div>
      </div>
      <div class="invest-history" id="investHistory" style="display:none;"></div>
      <div class="invest-note">※ 投入記録はClaude Codeで報告すると自動反映されます</div>
    </section>

    <!-- 監視銘柄（シンプル版） -->
    <section class="watch-section">
      <h2 class="section-title-simple">注目している銘柄</h2>
      <div class="watch-grid" id="watchlistGrid"></div>
    </section>

    <!-- 詳細データ（折りたたみ） -->
    <details class="detail-section">
      <summary class="detail-toggle">詳細データを見る</summary>

      <div class="detail-inner">
        <h3 class="detail-subtitle">主要指標</h3>
        <div class="indicator-grid" id="indicatorGrid"></div>

        <h3 class="detail-subtitle">底打ちシグナル</h3>
        <div class="signal-card" id="signalSection" style="display:none;">
          <div class="signal-header">
            <span class="signal-title" id="signalTitle">底打ちチェック</span>
            <span class="signal-count" id="signalCount">0/7</span>
          </div>
          <div class="signal-conditions" id="signalConditions"></div>
        </div>

        <h3 class="detail-subtitle">セクター騰落率</h3>
        <div class="sector-grid" id="sectorGrid"></div>

        <h3 class="detail-subtitle">原油・金・為替</h3>
        <div class="geo-grid" id="geoGrid"></div>
      </div>
    </details>

    <!-- Footer -->
    <footer class="footer">
      <p>※ 投資助言ではありません。判断は自己責任で。</p>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
